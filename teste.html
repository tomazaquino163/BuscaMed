<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Teste Supabase | BuscaMed</title>

    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #f4f8f6;
        }

        .teste-conexao {
            width: min(420px, calc(100% - 40px));
            padding: 32px;
            text-align: center;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        #status {
            margin-top: 20px;
            padding: 14px;
            border-radius: 10px;
            background: #eeeeee;
            font-weight: bold;
        }

        .sucesso {
            color: #146c43;
            background: #d1e7dd !important;
        }

        .erro {
            color: #842029;
            background: #f8d7da !important;
        }
    </style>
</head>

<body>
    <main class="teste-conexao">
        <h1>BuscaMed</h1>
        <p>Teste de conexão com o banco de dados</p>

        <div id="status">
            🟡 Testando conexão...
        </div>
    </main>

    <!-- Biblioteca oficial do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Configurações do projeto -->
    <script src="config.js"></script>

    <!-- Criação do cliente -->
    <script src="supabase.js"></script>

    <!-- Teste da conexão -->
    <script>
        async function testarConexao() {
            const status = document.getElementById("status");

            try {
                const { error } = await supabaseClient
                    .from("categories")
                    .select("id")
                    .limit(1);

                if (error) {
                    throw error;
                }

                status.textContent = "🟢 Conectado ao Supabase!";
                status.classList.add("sucesso");
            } catch (erro) {
                console.error("Erro na conexão:", erro);

                status.textContent =
                    "🔴 Erro ao conectar. Abra o console para verificar.";

                status.classList.add("erro");
            }
        }

        testarConexao();
    </script>
</body>
</html>
